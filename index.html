    <!-- ── Structured Data: FAQPage (boosts featured snippets) ─────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is MyRegister Kenya?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyRegister is a free digital school register platform for Kenyan schools, built by Samuhia Businesses (Cogvana). It enables teachers to mark daily attendance, send SMS notifications to parents via M-Pesa tokens, and generate analytics reports for CBC and 8-4-4 curriculum schools."
          }
        },
        {
          "@type": "Question",
          "name": "Who built MyRegister?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyRegister was built by Samuhia Businesses, also known as Cogvana. Samuhia is a Kenyan technology company focused on building digital tools for schools and education institutions across Kenya."
          }
        },
        {
          "@type": "Question",
          "name": "Is MyRegister free for Kenyan schools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The MyRegister platform is completely free for all Kenyan schools — primary and secondary. You only pay for SMS tokens when sending parent notifications, topped up via M-Pesa. Tokens start from KES 0.7 per SMS per parent."
          }
        },
        {
          "@type": "Question",
          "name": "Does MyRegister support CBC and 8-4-4?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. MyRegister is built for both the CBC (Competency Based Curriculum) and the traditional 8-4-4 curriculum. It supports class registers, attendance records, and report formats for both systems."
          }
        },
        {
          "@type": "Question",
          "name": "How do I send SMS to parents using MyRegister?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Top up your SMS token balance via M-Pesa STK push inside the app. Once you have tokens, you can send plain-text SMS messages to all parents in your school or class at once. 1 SMS (up to 140 characters) to 1 parent costs 1 token."
          }
        }
      ]
    }
